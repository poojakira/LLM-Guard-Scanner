name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check dependency metadata
        run: python -m pip check

      - name: Audit dependencies for CVEs
        run: pip-audit --strict

      - name: Lint
        run: ruff check src tests scan.py verify.py

      - name: Format check
        run: ruff format --check src tests scan.py verify.py

      - name: Test with coverage gate
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=80

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit pip-audit cyclonedx-bom

      - name: Run Bandit
        run: bandit -r src/ -ll

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

      - name: Generate SBOM
        run: cyclonedx-py requirements requirements.txt --output-format json --output-file sbom.json

      - name: Run Pytest
        run: pytest tests/ -v

      - name: Red-Team Corpus Test
        run: |
          # Ensure all red-team payloads are detected
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^# ]] || [[ -z "$line" ]]; then continue; fi
            python scan.py --input "$line" --json | grep '"is_blocked": true' || (echo "FAILED TO DETECT: $line" && exit 1)
          done < data/payloads/red_team_corpus.txt

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-guard-sbom
          path: sbom.json
