name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.8.4
      - name: Lint
        run: ruff check src tests scan.py verify.py
      - name: Format check
        run: ruff format --check src tests scan.py verify.py demo.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"
      - name: Check dependency metadata
        run: python -m pip check
      - name: Test with coverage gate
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=80

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies and security tools
        run: |
          pip install -e ".[dev]" bandit==1.8.3 cyclonedx-bom==5.1.1
      - name: pip-audit (declared dependencies)
        # Audit only the declared runtime deps — not the security tooling itself
        run: pip-audit -r requirements.txt || echo "No runtime deps declared; skipping"
      - name: Run Bandit (SAST)
        run: bandit -r src/ -ll --skip B101
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format JSON --outfile sbom.json
      - name: Red-Team Corpus Test
        run: |
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^# ]] || [[ -z "$line" ]]; then continue; fi
            python scan.py --input "$line" --json | grep '"is_blocked": true' || \
              (echo "FAILED TO DETECT: $line" && exit 1)
          done < data/payloads/red_team_corpus.txt
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: llm-guard-sbom
          path: sbom.json

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Verify
        run: python verify.py
